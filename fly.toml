app = "mytodolist-end-main"  # Nome da sua aplicação no Fly

primary_region = "gru"  # Use "gru" (São Paulo) ou outro próximo de você

[build]
  image = "node:18"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
